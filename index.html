<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Analytics Dashboard</title>
    <meta http-equiv="refresh" content="45">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #09090b;
            color: #e4e4e7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TOP SECTION */
        .ad-header {
            width: 100%;
            padding: 15px 0;
            background: #18181b;
            border-bottom: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* MAIN WRAPPER */
        .container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 20px auto;
            gap: 15px;
        }

        /* SIDEBARS */
        .side-ads {
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .grid-300 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .banner-card {
            background: #18181b;
            border: 1px solid #27272a;
            padding: 5px;
            border-radius: 4px;
        }

        /* FOOTER SECTION */
        .ad-footer {
            width: 100%;
            padding: 20px 0;
            background: #18181b;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        h3 { color: #3b82f6; margin: 5px 0; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="ad-header">

                <div class="banner-card"><iframe data-aa='2434953' src='//ad.a-ads.com/2434953/?size=300x250' style='border:0; width:300px; height:250px; overflow:hidden;'></iframe></div>

</body>
</html>
