<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        .banner-card { background: #18181b; border: 1px solid #27272a; padding: 5px; border-radius: 4px; }
        .small-ads-row { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        .ad-footer { width: 100%; padding: 20px 0; background: #18181b; margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        h3 { color: #3b82f6; margin: 5px 0; font-size: 14px; text-transform: uppercase; text-align: center; }
    </style>
</head>
